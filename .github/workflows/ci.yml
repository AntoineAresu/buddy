name: Symfony

on:
    pull_request:
        branches: [ main ]

jobs:
    ci:
        runs-on: ubuntu-latest

        services:
            mariadb:
                image: mariadb:latest
                ports:
                    - 3306:3306
                env:
                    MARIADB_DATABASE: buddy_test
                    MARIADB_USER: buddy
                    MARIADB_PASSWORD: 'buddy'
                    MARIADB_ROOT_PASSWORD: root
                options: >-
                    --health-cmd="mariadb-admin ping -h localhost"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        strategy:
            matrix:
                php-versions: [ '8.5' ]

        steps:
            -   uses: actions/checkout@v4
            -   uses: shivammathur/setup-php@v2
                with:
                    php-version: ${{ matrix.php-versions }}

            -   name: Cache Composer packages
                id: composer-cache
                uses: actions/cache@v3
                with:
                    path: vendor
                    key: ${{ runner.os }}-php-${{ hashFiles('**/composer.lock') }}
                    restore-keys: |
                        ${{ runner.os }}-php-

            -   name: Install dependencies
                run: composer install -q --no-progress --prefer-dist

            -   name: Composer audit
                run: composer audit

            -   name: CS Fixer
                run: vendor/bin/php-cs-fixer fix -v --dry-run --stop-on-violation

            -   name: PHPStan
                run: vendor/bin/phpstan analyse src --level=max
